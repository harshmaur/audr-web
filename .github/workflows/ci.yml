name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  GO_VERSION: "1.22.5"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Install Brotli
        run: sudo apt-get update && sudo apt-get install -y brotli

      - name: Install JS deps
        run: npm ci --no-audit --no-fund

      - name: Build WASM scan engine
        run: bash scripts/build-wasm.sh

      - name: WASM smoke test
        run: node scripts/wasm-smoke-test.mjs

      - name: Polish sample report
        run: node scripts/polish-sample-report.mjs

      - name: Astro check (typecheck)
        run: npx astro check

      - name: Vitest (unit + integration)
        run: npx vitest run --reporter=verbose

      - name: Astro build
        run: npx astro build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Playwright e2e
        run: npx playwright test
        env:
          CI: "true"

      - name: Lighthouse CI
        run: npx lhci autorun --config=./lighthouserc.cjs || echo "lhci is non-blocking until thresholds are tuned to real CDN"
        continue-on-error: true

      - name: Upload dist as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dist
          path: dist/
          retention-days: 7

# Deployment is handled by Vercel's GitHub integration — Vercel watches the
# repo and runs `npm run build` on every push, with preview URLs commented
# on PRs automatically. This workflow is the test gate that GitHub branch
# protection points at; it does not deploy.
